[pytest]
# Tests live in tests/. Tier-ordered filenames (test_0_*, test_1_*, ...) make the
# layer-cake run bottom-up: pytest collects files alphabetically and runs tests in
# definition order within each file.
testpaths = tests
python_files = test_*.py

# The "gate": -x stops at the FIRST failing tier, so a broken foundation surfaces
# before any higher tier's noise. Fix the lowest red tier, re-run, climb.
#   --tb=short keeps tracebacks readable; -ra prints a summary of non-passing tests.
addopts = -x --tb=short -ra